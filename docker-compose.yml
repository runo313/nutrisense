services:
  postgres:
    image: postgres:16
    container_name: nutrisense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - nutrisense-pg-data:/var/lib/postgresql/data

volumes:
  nutrisense-pg-data:
